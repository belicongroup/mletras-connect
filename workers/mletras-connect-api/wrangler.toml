name = "mletras-connect-api"
main = "src/index.ts"
compatibility_date = "2026-07-02"
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "mletras-connect-db"
database_id = "be90d141-80a3-4244-bb8b-5110f95db121"

[[kv_namespaces]]
binding = "OTP"
id = "7702d858fe95492595b13de409ec3f5e"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "mletras-connect-media"

# Daily media lifecycle sweep: removes abandoned uploads and orphaned R2 objects.
[triggers]
crons = ["0 4 * * *"]

[vars]
FROM_EMAIL = "MLetras Connect <connect@mletras.com>"
# Media pipeline configuration. Non-secret values live here; tokens are set via
# `wrangler secret put` (CF_IMAGES_TOKEN, CF_STREAM_TOKEN, CF_STREAM_WEBHOOK_SECRET).
# Leave these blank to keep the raw-R2 fallback path active.
# CF_ACCOUNT_ID = ""
# CF_IMAGES_HASH = ""
# CF_STREAM_CUSTOMER_CODE = ""
# MEDIA_CDN_URL = "https://media.mletras.com"

[[routes]]
pattern = "connect-api.mletras.com"
custom_domain = true

[observability]
enabled = true
